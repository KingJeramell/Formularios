<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulario 3</title>
</head>
<body>
    <form>
        <div class="encabezado">
            <h1>Formulario de Admision</h1>
            <div class="logo">TU LOGO</div>
        </div>

        <p class="bienvenida">¡Bienvenido al proceso de admisión!</p>

        <div class="seccion">
            <h2>Datos Personales</h2>
        </div>

        <div class="campo">
            <label>Nombre y Apellidos:</label>
            <input type="text" name="nombre">
        </div>

        <hr class="separador">

        <div class="grid">
            <div class="campo">
                <label>Fecha de Nacimiento:</label>
                <input type="text" name="fecha_nacimiento">
            </div>
            <div class="campo-sexo">
                <label class="titulo">Sexo:</label>
                <div class="opciones">
                    <label><input type="checkbox"> Masculino</label>
                    <label><input type="checkbox"> Femenino</label>
                </div>
            </div>
        </div>

        <hr class="separador">

        <div class="campo">
            <label>Numero de Telefono:</label>
            <input type="text" name="telefono">
        </div>

        <hr class="separador">

        <div class="campo">
            <label>Direccion:</label>
            <input type="text" name="direccion">
        </div>

        <div class="grid">
            <div class="campo">
                <label>Ciudad:</label>
                <input type="text" name="ciudad">
            </div>
            <div class="campo">
                <label>Region:</label>
                <input type="text" name="region">
            </div>
        </div>

        <div class="grid">
            <div class="campo">
                <label>Codigo Postal:</label>
                <input type="text" name="codigo_postal">
            </div>
            <div class="campo">
                <label>Pais:</label>
                <input type="text" name="pais">
            </div>
        </div>

        <div class="campo">
            <label>Correo Electronico:</label>
            <input type="text" name="correo_electronico">
        </div>

        <div class="Footer-form">
            <p class="legal">Compruebe que el contenido del formulario contiene correctamente sus datos personales.</p>
            <div class="firma-final">
                <input type="text" name="firma_final">
                <label>Fecha/Firma</label>
            </div>
        </div>

    </form>
</body>
</html>
