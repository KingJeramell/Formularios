<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulario 4</title>
</head>
<body>
    <form>
    <div class="encabezado">
    <div class="logo">TU LOGO</div>
       <h1>Formulario de Medico</h1>
       <h2>Nombre del Centro Medico</h2>
    </div>


<div class="seccion">
<h2>Informacion del paciente</h2>
</div>
    
        <div class="campo">
        <label>Nombre:</label>
        <input type="text" name="Nombre">
    </div>

    <div class="campo">
        <label>Fecha de Nacimiento:</label>
        <input type="text" name="fecha_nacimiento">
    </div>

<div class="campo">
    <label>Sexo:</label>
    <input type="checkbox">Masculino
    <input type="checkbox">Femenino
    <input type="checkbox">Otros
</div>

</div>
<div class="campo">
    <label>Direccion:</label>
    <input type="text" name="direccion">
</div>
<div class="seccion">
    <h2>Motivo de la Visita</h2>
</div>
<div class="campo">
    <textarea name="motivo" rows="3"></textarea>
</div>
<div class= "seccion">
    <h2>Informacion del Seguro</h2>
</div>
<div class="campo">
    <label>Seguro Proviniente:</label>
    <input type="text"name="seguro">
</div>
<div class="campo">
    <label>Numero de poliza:</label>
    <input type="text" name="poliza">
</div>
<div class="seccion">
    <h2>Informacion de Contacto en caso de Emergencia</h2>
</div>
<div class="campo">
<label>Nombres y Apellidos:</label>
<input type="text" name="contacto_nombre">
</div>
<div class="campo">
<label>Numero de telefono:</label>
<input type="text" name="contacto_telefono">
</div>
<div class="campo">
<label>Email:</label>
<input type="text" name="contacto_email">
</div>

<div class="Footer-form">
   <div class="firma-final">
    <input type="text"name="fecha">
    <label>Mes, Dia, Año</label>
   </div>
    <div class="firma-final">
     <input type="text"name="firma">
     <label>Nombre y Apellidos</label>
</div>
</div>
   </form>
</body>
</html>
