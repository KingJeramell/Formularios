<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulario 1</title>
</head>

<body>
    <div class="sidebar">
    <span></span>
    <span></span>
    <span></span>
    </div>

    <div class="contenido">
     <header>
    <h1>Formulario de inscripcion</h1>
    </header>

        <form action="index.html" method="post">
            <div class="campo">
            <label for="Solicitud de ingreso">Solicitud de ingreso a:</label>
            <input type="text" id="Solicitud de ingreso" name="Solicitud de ingreso">
            </div>


            <div class="campo">
            <label for="Director/Presidente">Director/Presidente:</label>
            <input type="text" id="Director/Presidente" name="Director/Presidente">
            </div>


           <label>Tipo de afiliacion:</label>
            <div class="Tipodeafiliacion">           
            <label for="Bronce"><input id="Bronce" type="checkbox">Bronce</label>
            <label for="Plata"><input id="Plata" type="checkbox">Plata</label>
            <label for="Oro"><input id="Oro" type="checkbox">Oro</label>
           </div>

            <div class="SolicitantesTitulardecuenta">
            <label for="Solicitantes/Titular de cuenta">Solicitantes/Titular de cuenta:</label>
            <input type="text" id="Solicitantes/Titular de cuenta" name="Solicitantes/Titular de cuenta">
            </div>

            <div class="grid">
                <div class="campo">
                    <label for="nombre">Nombre de pila:</label>
                    <input type="text" name="nombre">
                </div>
                <div class="campo">
                    <label>Direccion:</label>
                    <input type="text" name="Direccion">
                </div>
            </div>
                <div class="grid">
                <div class="campo">
                    <label>Fecha de nacimiento:</label>
                    <input type="text" name="Fecha_nacimiento">
                </div>

                <div class="campo">
                    <label>Nationality:</label>
                    <input type="text" name="Nationality">
                </div>
           </div>
            <div class="grid">
                <div class="campo">
                    <label>Fecha de Nacimiento:</label>
                    <div class="fecha-cajitas">
                        <input type="text" maxlength="2" placeholder="DD">
                        <span></span>
                        <input type="text" maxlength="2" placeholder="MM">
                        <span></span>
                        <input type="text" maxlength="4" placeholder="AAAA">
                    </div>         
                </div>
               
                <div class="campo">
                    <label>Codigo:</label>
                    <input type="text" name="Codigo">
                </div>
            </div>
                <div class="grid">
                <div class="campo">
                    <label>Sexo:</label>
                    <input type="text" name="Sexo">
                </div>
                <div class="campo">
                    <label>Ciudad/pais:</label>
                    <input type="text" name="Ciudad">
                   </div>
                </div>
                   <div class="campo">
                    <label>Correo Electronico:</label>
                    <label>@</label><input type="text" name="Correo_Electronico"> 
                    
                </div>
                <div class ="grid">
                    <div class="campo">
                        <label>Permiso de conducir:</label>
                        <input type="text" name="Permiso">
                    </div>
                    <div class="campo">
                        <label>Otro numero de tarjeta:</label>
                        <input type="text" name="tarjeta">
                        <em>Compruebe que el contenido del formulario conatenga correctamente sus datos personales</em>
                        <em>Personaliza online un formulario de registro en Edit.org</em>
                        
                    </div>
                    </div>
                    <div class="firma">
                       <div class="logo">
                        <p>TU LOGO</p>
                          </div>
                          <div class="campo">
                        <input type="text" name="firma">
                          <label>Firma/Fecha</label>
                    </div>
        </form>
    </div>
</body>
</html>
